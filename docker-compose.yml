services:
  nginx:
    build: .
    image: ghcr.io/openkilt/openrepo:latest
    command: nginx
    restart: unless-stopped
    ports:
      - "7376:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      django:
        condition: service_healthy
    volumes:
      - openrepo-data:/var/lib/openrepo

  django:
    build: .
    image: ghcr.io/openkilt/openrepo:latest
    expose:
      - "8000"
    command: run_openrepoweb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - openrepo-data:/var/lib/openrepo
    environment:
      # - "OPENREPO_CSRF_TRUSTED_ORIGINS=myproxiedname.example.com"   #Multiple domains are space delimited"
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-}
      - OPENREPO_DB_TYPE=postgresql
      - OPENREPO_PG_DATABASE=openrepo
      - OPENREPO_PG_USERNAME=postgres
      - OPENREPO_PG_PASSWORD=${OPENREPO_PG_PASSWORD:-postgres}
      - OPENREPO_PG_HOSTNAME=db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/app/django/manage.py migrate --check"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build: .
    image: ghcr.io/opentreecz/openrepo:latest
    command: ./django/manage.py runworker
    volumes:
      - openrepo-data:/var/lib/openrepo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'manage.py runworker' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-}
      - OPENREPO_DB_TYPE=postgresql
      - OPENREPO_PG_DATABASE=openrepo
      - OPENREPO_PG_USERNAME=postgres
      - OPENREPO_PG_PASSWORD=${OPENREPO_PG_PASSWORD:-postgres}
      - OPENREPO_PG_HOSTNAME=db
    depends_on:
      django:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_PASSWORD=${OPENREPO_PG_PASSWORD:-postgres}
      - POSTGRES_USER=postgres
      - POSTGRES_DB=openrepo
    volumes:
      - openrepo-pq:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'" ]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  openrepo-data:
  openrepo-pq: